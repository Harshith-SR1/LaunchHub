apiVersion: apps/v1
kind: Deployment
metadata:
  name: nexusforge-api
  namespace: nexusforge
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nexusforge-api
  template:
    metadata:
      labels:
        app: nexusforge-api
    spec:
      containers:
        - name: api
          image: ghcr.io/your-org/nexusforge-api:latest
          ports:
            - containerPort: 4000
          envFrom:
            - configMapRef:
                name: nexusforge-config
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: nexusforge-secrets
                  key: DATABASE_URL
            - name: JWT_ACCESS_SECRET
              valueFrom:
                secretKeyRef:
                  name: nexusforge-secrets
                  key: JWT_ACCESS_SECRET
            - name: REDIS_URL
              value: redis://nexusforge-redis.nexusforge.svc.cluster.local:6379
            - name: REDIS_HOST
              value: nexusforge-redis.nexusforge.svc.cluster.local
            - name: REDIS_PORT
              value: "6379"
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: nexusforge-redis-secret
                  key: REDIS_PASSWORD
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: 4000
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 4000
            initialDelaySeconds: 30
            periodSeconds: 20
