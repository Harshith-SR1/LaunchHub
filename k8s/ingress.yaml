apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: nexusforge-ingress
  namespace: nexusforge
  annotations:
    kubernetes.io/ingress.class: nginx
spec:
  rules:
    - host: app.nexusforge.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: nexusforge-web
                port:
                  number: 80
    - host: api.nexusforge.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: nexusforge-api
                port:
                  number: 80
