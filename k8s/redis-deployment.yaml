apiVersion: v1
kind: Service
metadata:
  name: nexusforge-redis
  namespace: nexusforge
spec:
  selector:
    app: nexusforge-redis
  ports:
    - port: 6379
      targetPort: 6379
      protocol: TCP
  type: ClusterIP

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nexusforge-redis
  namespace: nexusforge
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nexusforge-redis
  template:
    metadata:
      labels:
        app: nexusforge-redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: nexusforge-redis-secret
                  key: REDIS_PASSWORD
          command: ["sh", "-c", "redis-server --requirepass $REDIS_PASSWORD --dir /data"]
          volumeMounts:
            - name: redis-data
              mountPath: /data
          ports:
            - containerPort: 6379
          resources:
            requests:
              memory: "64Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
          readinessProbe:
            tcpSocket:
              port: 6379
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 6379
            initialDelaySeconds: 15
            periodSeconds: 20
      volumes:
        - name: redis-data
          persistentVolumeClaim:
            claimName: redis-data-pvc
